<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex.ai - Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="assistant-card">
        <div class="status-dot" id="status-dot"></div>
        <h1>Alex.ai</h1>
        <p id="description">Click the button and say "Hello" or "What time is it?"</p>
        
        <div class="display-box">
            <span id="transcript">Waiting for voice input...</span>
        </div>

        <button id="talk-btn">
            <span class="icon">🎤</span> Start Listening
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
